name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zcode-cli-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install extraction tools
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and test
        run: bun run release:build

      - name: Pack and install-test
        run: bun run release:pack

      - name: Verify repository and npm metadata
        run: |
          npm pkg fix --dry-run --json
          git diff --check
          git diff --exit-code -- package.json zcode-runtime.lock.json
